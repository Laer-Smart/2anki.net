name: Server

on:
  push:
    paths-ignore:
      - '**.md'
      - 'web/**'
      - 'create_deck/**'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static:
    name: static (22.20.0)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - name: Typecheck
        run: pnpm typecheck
        env:
          CI: true
      - name: Lint
        run: pnpm lint
        env:
          CI: true
      - name: Format check
        run: pnpm format:check
        env:
          CI: true
      - name: Architecture
        run: pnpm arch
        env:
          CI: true

  test:
    name: test (22.20.0)
    if: ${{ github.actor != 'dependabot[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - name: Test
        run: pnpm test
        env:
          CI: true
          NOTION_KEY: ${{ secrets.NOTION_KEY }}
          SKIP_CREATE_DECK: true
