name: Deploy to 2anki.net

on:
  push:
    paths-ignore:
      - '**.md'
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: main
    concurrency:
      group: 'production'
      cancel-in-progress: false
    steps:
      - name: SSH and run script
        uses: appleboy/ssh-action@v1.2.5
        env:
          GIT_SHA: ${{ github.sha }}
          ASSET_BASE_URL: ${{ secrets.ASSET_BASE_URL }}
          SPACES_ASSETS_ACCESS_KEY_ID: ${{ secrets.SPACES_ASSETS_ACCESS_KEY_ID }}
          SPACES_ASSETS_SECRET_ACCESS_KEY: ${{ secrets.SPACES_ASSETS_SECRET_ACCESS_KEY }}
          SPACES_ASSETS_BUCKET: ${{ secrets.SPACES_ASSETS_BUCKET }}
          SPACES_ASSETS_REGION: ${{ secrets.SPACES_ASSETS_REGION }}
        with:
          host: 2anki.net
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: GIT_SHA,ASSET_BASE_URL,SPACES_ASSETS_ACCESS_KEY_ID,SPACES_ASSETS_SECRET_ACCESS_KEY,SPACES_ASSETS_BUCKET,SPACES_ASSETS_REGION
          script: |
            set -e
            set -o pipefail

            SERVER_DIR=~/src/github.com/2anki/2anki.net

            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            nvm install $(cat ${SERVER_DIR}/.nvmrc)
            nvm use $(cat ${SERVER_DIR}/.nvmrc)

            node --version
            npm install -g pnpm@10.18.2 --force
            pnpm --version

            git -C ${SERVER_DIR} fetch origin main
            git -C ${SERVER_DIR} reset --hard origin/main
            git -C ${SERVER_DIR} clean -fd

            pnpm --dir ${SERVER_DIR} install --frozen-lockfile
            pnpm --dir ${SERVER_DIR} exec puppeteer browsers install chrome
            pip install -r ${SERVER_DIR}/create_deck/requirements.txt

            if ! command -v aws >/dev/null 2>&1; then
              echo "Installing aws-cli to ~/.local/bin..."
              pip install --user awscli
            fi
            export PATH="$HOME/.local/bin:$PATH"
            aws --version

            pnpm --dir ${SERVER_DIR} run build
            ASSET_BASE_URL="$ASSET_BASE_URL" pnpm --filter 2anki-web -C ${SERVER_DIR} build

            echo "Syncing web/build/assets/ to s3://${SPACES_ASSETS_BUCKET}/assets/..."
            AWS_ACCESS_KEY_ID="$SPACES_ASSETS_ACCESS_KEY_ID" \
            AWS_SECRET_ACCESS_KEY="$SPACES_ASSETS_SECRET_ACCESS_KEY" \
            aws s3 sync ${SERVER_DIR}/web/build/assets/ s3://${SPACES_ASSETS_BUCKET}/assets/ \
              --endpoint-url="https://${SPACES_ASSETS_REGION}.digitaloceanspaces.com" \
              --cache-control "public, max-age=31536000, immutable" \
              --acl public-read \
              --size-only

            cd ${SERVER_DIR}
            export GIT_SHA
            pm2 startOrRestart ecosystem.config.js --update-env
            pm2 save

            echo "Waiting for /api/version on :3000 to report sha=${GIT_SHA}..."
            HEALTHY=0
            for i in $(seq 1 15); do
              RESPONSE=$(curl -fsS http://127.0.0.1:3000/api/version 2>/dev/null || echo "")
              ACTUAL_SHA=$(echo "$RESPONSE" | jq -r '.sha // empty' 2>/dev/null || echo "")
              if [ -n "$ACTUAL_SHA" ] && [ "$ACTUAL_SHA" = "$GIT_SHA" ]; then
                echo "Health check passed after ${i} attempts (sha=${ACTUAL_SHA})"
                HEALTHY=1
                break
              fi
              sleep 2
            done
            if [ "$HEALTHY" != "1" ]; then
              echo "Health check failed — expected sha=${GIT_SHA}, last response: ${RESPONSE}"
              echo "Recent server logs:"
              pm2 logs server --lines 80 --nostream
              exit 1
            fi
