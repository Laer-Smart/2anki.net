name: Deploy to 2anki.net

on:
  push:
    paths-ignore:
      - '**.md'
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: main
    concurrency:
      group: 'production'
      cancel-in-progress: false
    steps:
      - name: SSH and run script
        uses: appleboy/ssh-action@v1.2.5
        env:
          GIT_SHA: ${{ github.sha }}
        with:
          host: 2anki.net
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: GIT_SHA
          script: |
            set -e
            set -o pipefail

            SERVER_DIR=~/src/github.com/2anki/2anki.net

            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            nvm install $(cat ${SERVER_DIR}/.nvmrc)
            nvm use $(cat ${SERVER_DIR}/.nvmrc)

            node --version
            npm install -g pnpm@10.18.2 --force
            pnpm --version

            git -C ${SERVER_DIR} fetch origin main
            git -C ${SERVER_DIR} reset --hard origin/main
            git -C ${SERVER_DIR} clean -fd

            pnpm --dir ${SERVER_DIR} install --frozen-lockfile
            pnpm --dir ${SERVER_DIR} exec puppeteer browsers install chrome
            pip install -r ${SERVER_DIR}/create_deck/requirements.txt

            pnpm --dir ${SERVER_DIR} run build
            pnpm --filter 2anki-web -C ${SERVER_DIR} build

            cd ${SERVER_DIR}
            export GIT_SHA
            pm2 startOrRestart ecosystem.config.js --update-env
            pm2 save

            echo "Waiting for /api/version on :3000 to report sha=${GIT_SHA}..."
            HEALTHY=0
            for i in $(seq 1 15); do
              RESPONSE=$(curl -fsS http://127.0.0.1:3000/api/version 2>/dev/null || echo "")
              ACTUAL_SHA=$(echo "$RESPONSE" | jq -r '.sha // empty' 2>/dev/null || echo "")
              if [ -n "$ACTUAL_SHA" ] && [ "$ACTUAL_SHA" = "$GIT_SHA" ]; then
                echo "Health check passed after ${i} attempts (sha=${ACTUAL_SHA})"
                HEALTHY=1
                break
              fi
              sleep 2
            done
            if [ "$HEALTHY" != "1" ]; then
              echo "Health check failed — expected sha=${GIT_SHA}, last response: ${RESPONSE}"
              echo "Recent server logs:"
              pm2 logs server --lines 80 --nostream
              exit 1
            fi
