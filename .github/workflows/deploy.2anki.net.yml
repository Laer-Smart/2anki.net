name: Deploy to 2anki.net

on:
  push:
    paths-ignore:
      - '**.md'
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: main
    concurrency:
      group: 'production'
      cancel-in-progress: false
    steps:
      - name: SSH and run script
        uses: appleboy/ssh-action@v1.2.5
        env:
          GIT_SHA: ${{ github.sha }}
          RUN_ID: ${{ github.run_id }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
          ASSET_BASE_URL: ${{ secrets.ASSET_BASE_URL }}
          SPACES_ASSETS_ACCESS_KEY_ID: ${{ secrets.SPACES_ASSETS_ACCESS_KEY_ID }}
          SPACES_ASSETS_SECRET_ACCESS_KEY: ${{ secrets.SPACES_ASSETS_SECRET_ACCESS_KEY }}
          SPACES_ASSETS_BUCKET: ${{ secrets.SPACES_ASSETS_BUCKET }}
          SPACES_ASSETS_REGION: ${{ secrets.SPACES_ASSETS_REGION }}
        with:
          host: 2anki.net
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: GIT_SHA,RUN_ID,RUN_ATTEMPT,ASSET_BASE_URL,SPACES_ASSETS_ACCESS_KEY_ID,SPACES_ASSETS_SECRET_ACCESS_KEY,SPACES_ASSETS_BUCKET,SPACES_ASSETS_REGION
          script: |
            set -e
            set -o pipefail

            SERVER_DIR=~/src/github.com/2anki/2anki.net

            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            nvm install $(cat ${SERVER_DIR}/.nvmrc)
            nvm use $(cat ${SERVER_DIR}/.nvmrc)

            node --version
            npm install -g pnpm@10.18.2 --force
            pnpm --version

            git -C ${SERVER_DIR} fetch origin main
            git -C ${SERVER_DIR} reset --hard origin/main
            git -C ${SERVER_DIR} clean -fd

            # TrunkVer for this artifact: when (UTC build time) . what (deployed
            # short sha) . where (this Actions run, the build log). Exported as
            # RELEASE so resolveRelease() surfaces it on /api/version and every
            # /ops/errors group. GIT_SHA is left untouched — the blue-green
            # health check still verifies /api/version .sha == GIT_SHA.
            TRUNKVER="$(date -u +%Y%m%d%H%M%S).0.0-g$(git -C ${SERVER_DIR} rev-parse --short HEAD)-${RUN_ID}-${RUN_ATTEMPT}"
            export RELEASE="$TRUNKVER"
            echo "TrunkVer: $RELEASE"

            pnpm --dir ${SERVER_DIR} install --frozen-lockfile
            pnpm --dir ${SERVER_DIR} exec puppeteer browsers install chrome
            pip install -r ${SERVER_DIR}/create_deck/requirements.txt

            if ! command -v aws >/dev/null 2>&1; then
              echo "Installing aws-cli to ~/.local/bin..."
              pip install --user awscli
            fi
            export PATH="$HOME/.local/bin:$PATH"
            aws --version

            pnpm --dir ${SERVER_DIR} run build
            ASSET_BASE_URL="$ASSET_BASE_URL" REACT_APP_RELEASE="$RELEASE" pnpm --filter 2anki-web -C ${SERVER_DIR} build

            echo "Syncing web/build/assets/ to s3://${SPACES_ASSETS_BUCKET}/assets/..."
            AWS_ACCESS_KEY_ID="$SPACES_ASSETS_ACCESS_KEY_ID" \
            AWS_SECRET_ACCESS_KEY="$SPACES_ASSETS_SECRET_ACCESS_KEY" \
            aws s3 sync ${SERVER_DIR}/web/build/assets/ s3://${SPACES_ASSETS_BUCKET}/assets/ \
              --endpoint-url="https://${SPACES_ASSETS_REGION}.digitaloceanspaces.com" \
              --cache-control "public, max-age=31536000, immutable" \
              --acl public-read \
              --size-only

            cd ${SERVER_DIR}
            export GIT_SHA
            # Zero-downtime blue-green cutover: start the idle color, health-check
            # it, atomically swap the Apache upstreams, drain the old color. The
            # script health-checks the new color on its port and verifies the
            # public URL reports ${GIT_SHA} before retiring the old one; it exits
            # non-zero on any failure with the current color still serving.
            bash scripts/deploy-blue-green.sh || {
              echo "blue-green deploy failed — recent logs:"
              pm2 logs --lines 80 --nostream
              exit 1
            }
