name: 2anki CLI release

# Builds standalone `2anki` binaries for macOS, Linux, and Windows and attaches
# them to a GitHub Release. Trigger by pushing a tag like `cli-v1.0.0`, or run
# manually from the Actions tab.
on:
  push:
    tags:
      - 'cli-v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset: 2anki-linux-x64
            binary: dist/cli/2anki
          - os: macos-latest
            asset: 2anki-macos-arm64
            binary: dist/cli/2anki
          - os: windows-latest
            asset: 2anki-windows-x64.exe
            binary: dist/cli/2anki.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22.20.0'
      - name: Bundle the CLI
        run: npm run cli:bundle
      - name: Build the standalone binary
        run: node scripts/build-cli-binary.mjs
      - name: Rename for the platform
        shell: bash
        run: |
          mkdir -p out
          cp "${{ matrix.binary }}" "out/${{ matrix.asset }}"
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: out/${{ matrix.asset }}
      - name: Attach to the release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: out/${{ matrix.asset }}

  publish-npm:
    # Publishes @2anki/cli so `npx @2anki/cli` works with no Gatekeeper.
    # Uses npm Trusted Publishing (OIDC) — no NPM_TOKEN secret. Configure the
    # trusted publisher for @2anki/cli on npmjs.com pointing at this repo +
    # workflow before the first tagged release.
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22.20.0'
          registry-url: 'https://registry.npmjs.org'
      # Trusted Publishing needs a recent npm CLI (>= 11.5.1).
      - name: Update npm
        run: npm install -g npm@latest
      - name: Assemble the npm package
        run: node scripts/build-cli-npm.mjs "${{ github.ref_name }}"
      - name: Publish to npm
        working-directory: npm-dist
        run: npm publish --access public
