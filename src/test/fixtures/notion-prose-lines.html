<html><head><meta http-equiv="Content-Type" content="text/html; charset=utf-8"/><title>Field Notes</title></head><body><article id="field-notes-article" class="page sans"><header><h1 class="page-title" dir="auto"><strong>Field Notes</strong></h1><p class="page-description" dir="auto"></p></header><div class="page-body"><div style="display:contents" dir="auto"><p id="prose-1" class="">The river rose overnight. By morning the lower meadow was a shallow lake.</p></div><div style="display:contents" dir="auto"><p id="prose-2" class="">We moved the equipment uphill. Nobody wanted a repeat of last spring.</p></div></div></article><span class="sans" style="font-size:14px;padding-top:2em"></span></body></html>
