<html><head><meta http-equiv="Content-Type" content="text/html; charset=utf-8"/><title>A Little Song</title></head><body><article id="a-little-song-article" class="page sans"><header><h1 class="page-title" dir="auto"><strong>A Little Song</strong></h1><p class="page-description" dir="auto"></p></header><div class="page-body"><div style="display:contents" dir="auto"><p id="line-1" class="">Over the hills we go</p></div><div style="display:contents" dir="auto"><p id="line-2" class="">Under a wide blue sky</p></div><div style="display:contents" dir="auto"><p id="line-3" class="">Past the river slow</p></div><div style="display:contents" dir="auto"><p id="line-4" class="">Where the swallows fly</p></div><div style="display:contents" dir="auto"><p id="break-1" class=""></p></div><div style="display:contents" dir="auto"><p id="line-5" class="">Sing for the morning light</p></div><div style="display:contents" dir="auto"><p id="line-6" class="">(Come along now!)</p></div><div style="display:contents" dir="auto"><p id="line-7" class="">Sing for the falling night</p></div></div></article><span class="sans" style="font-size:14px;padding-top:2em"></span></body></html>
